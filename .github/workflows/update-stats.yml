name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 */8 * * *" # runs every 8 hours
  workflow_dispatch: # lets you trigger it manually from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Stats Card SVG
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: Abhishekfm
          output_path: generated/stats.svg
          # Customize look here:
          args: >
            --theme tokyonight
            --show_icons true
            --hide_border true
            --count_private true
            --include_all_commits true
            --rank_icon github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages SVG
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: Abhishekfm
          output_path: generated/languages.svg
          card_type: top-langs
          args: >
            --theme tokyonight
            --hide_border true
            --layout compact
            --langs_count 8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update GitHub stats SVGs [skip ci]"
          file_pattern: generated/*.svg
